name: ews_semeru
description: "Kerangka aplikasi peringatan dini erupsi Gunung Semeru berbasis Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  flutter_dotenv: ^6.0.1
  go_router: ^17.3.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  youtube_player_iframe: ^6.0.2
  cached_network_image: ^3.4.1
  geolocator: ^14.0.3
  pocketbase: ^0.24.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/.env.example
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"

flutter_native_splash:
  color: "#08101C"
  image: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    icon_background_color: "#08101C"
    color: "#08101C"
